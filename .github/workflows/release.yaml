name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.0)"
        required: true
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  bundle-release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v2
        with:
          repository: ${{ github.event.repository.full_name }}
          ref: "master"

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci

      - name: Compile roblox-ts
        run: |
          npm run compile

      - name: Build model
        run: |
          npm run build

      - name: Bundle modules
        run: |
          VERSION=${{ github.event.release.tag_name || github.event.inputs.version }}
          remodel run ci/bundle.lua public/latest.lua $VERSION minify
          remodel run ci/bundle.lua public/latest.debug.lua $VERSION-dbg debug

      - name: Commit latest
        uses: EndBug/add-and-commit@v8.0.2
        with:
          default_author: "github_actions"
          add: "['public/latest.lua', 'public/latest.debug.lua']"
          message: 🐋 Release ${{ github.event.release.tag_name || github.event.inputs.version }}
