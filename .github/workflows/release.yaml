name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.0)"
        required: true
  release:
    types: [published, prereleased]

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.repository.full_name }}
          ref: "master"

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci

      - name: Compile and build model
        run: npm run compile && npm run build

      - name: Bundle modules
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          remodel run ci/bundle.lua dist/Orca.lua "$VERSION" minify
          remodel run ci/bundle.lua dist/Orca.debug.lua "$VERSION-debug" debug verbose

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.version }}
          files: |
            dist/Orca.lua
            dist/Orca.debug.lua
            dist/Orca.rbxm
